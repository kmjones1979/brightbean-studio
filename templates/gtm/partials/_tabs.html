{% comment %}
Renders the tab strip on the plan detail page.
Context: tab_list (list of (slug, label) tuples), active_tab (slug)
{% endcomment %}
{% for slug, label in tab_list %}
    <a href="?tab={{ slug }}"
       class="px-3 py-2 text-sm font-medium border-b-2 -mb-px transition-colors {% if active_tab == slug %}border-stone-900 text-stone-900{% else %}border-transparent text-stone-500 hover:text-stone-800{% endif %}">
        {{ label }}
    </a>
{% endfor %}
